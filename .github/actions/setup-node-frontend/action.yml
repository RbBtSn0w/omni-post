name: 'Setup Node Frontend'
description: 'Setup Node.js environment and install dependencies'

inputs:
  node-version:
    description: 'Node.js version to use'
    required: false
    default: '24.x'

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js ${{ inputs.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: 'npm'
        cache-dependency-path: package-lock.json

    - name: Install dependencies
      shell: bash
      run: |
        echo "Installing npm dependencies..."
        npm ci --include=optional

    - name: Ensure Rollup Native Binary (Linux x64)
      shell: bash
      run: |
        if [[ "$(uname -s)" == "Linux" && "$(uname -m)" == "x86_64" ]]; then
          ROLLUP_VERSION="$(node -p "try { require('./node_modules/rollup/package.json').version } catch { '' }")"
          if [[ -n "$ROLLUP_VERSION" ]]; then
            npm install --no-save "@rollup/rollup-linux-x64-gnu@${ROLLUP_VERSION}"
          fi
        fi
