name: "Setup Node.js Backend Engine"
description: "Sets up Node and installs dependencies"
inputs:
  node-version:
    description: "Version of Node to use"
    required: false
    default: "20.19.0"
runs:
  using: "composite"
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: 'npm'
        cache-dependency-path: package-lock.json

    - name: Install dependencies
      shell: bash
      run: |
        echo "Installing npm dependencies..."
        npm ci --include=optional
      env:
        HUSKY: 0

    - name: Ensure Rollup Native Binary (Linux x64)
      shell: bash
      run: |
        if [[ "$(uname -s)" == "Linux" && "$(uname -m)" == "x86_64" ]]; then
          ROLLUP_VERSION="$(node -p "try { require('./node_modules/rollup/package.json').version } catch { '' }")"
          if [[ -n "$ROLLUP_VERSION" ]]; then
            npm install --no-save "@rollup/rollup-linux-x64-gnu@${ROLLUP_VERSION}"
          fi
        fi
