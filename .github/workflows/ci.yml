name: CI

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [ main, develop ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Only cancel non-main branches to ensure releases finish atomically
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      backend_node: ${{ steps.filter.outputs.backend_node }}
      shared: ${{ steps.filter.outputs.shared }}
      cli: ${{ steps.filter.outputs.cli }}
      node_infra: ${{ steps.filter.outputs.node_infra }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Filter Paths
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            backend:
              - 'apps/backend/**'
            frontend:
              - 'apps/frontend/**'
            backend_node:
              - 'apps/backend-node/**'
            shared:
              - 'packages/shared/**'
            cli:
              - 'packages/cli/**'
            node_infra:
              - 'package.json'
              - 'package-lock.json'
              - 'packages/shared-config/**'
            ci:
              - '.github/workflows/**'
              - '.github/actions/**'

  backend-ci:
    name: Backend (Lint, Test & Security)
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.backend == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    timeout-minutes: 20

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: ./.github/actions/setup-python-backend
        with:
          install-dev: 'true'

      - name: Install Playwright
        working-directory: apps/backend
        run: python -m playwright install chromium

      - name: Lint (Black)
        working-directory: apps/backend
        run: black --check src/ --line-length=100

      - name: Lint (Isort)
        working-directory: apps/backend
        run: isort --check-only src/ --profile black

      - name: Lint (Pylint - Critical Only)
        working-directory: apps/backend
        # Allow failures, but good to see output
        run: pylint src/ --disable=all --enable=E,F --exit-zero

      - name: Security (Bandit)
        working-directory: apps/backend
        run: bandit -r src/ -c pyproject.toml 2>&1 || true

      - name: Security (Pip Audit)
        working-directory: apps/backend
        run: pip-audit --progress-spinner=off || echo "Pip Audit met warnings but continuing..."

      - name: Run Tests
        working-directory: apps/backend
        run: pytest tests/ -v --cov=src --cov-report=xml:test-results/coverage/coverage.xml

      - name: Upload Coverage
        uses: codecov/codecov-action@v5
        if: always()
        with:
          files: ./apps/backend/test-results/coverage/coverage.xml
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false

  shared-ci:
    name: Shared Package (Lint, Test & Build)
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.shared == 'true' || needs.changes.outputs.node_infra == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    timeout-minutes: 20

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Guard No New Any
        env:
          DIFF_BASE: ${{ github.event.before || format('{0}^', github.event.pull_request.head.sha || github.sha) }}
          DIFF_HEAD: ${{ github.event.pull_request.head.sha || github.sha }}
        run: node tools/scripts/check-no-new-any.mjs --base "$DIFF_BASE" --head "$DIFF_HEAD"

      - name: Setup Node
        uses: ./.github/actions/setup-node-backend

      - name: Lint
        run: npm run lint -w @omni-post/shared

      - name: Run Tests
        run: npm run test -w @omni-post/shared

      - name: Build
        run: npm run build -w @omni-post/shared

  cli-ci:
    name: CLI Package (Lint & Build)
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.cli == 'true' || needs.changes.outputs.shared == 'true' || needs.changes.outputs.node_infra == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    timeout-minutes: 20

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Guard No New Any
        env:
          DIFF_BASE: ${{ github.event.before || format('{0}^', github.event.pull_request.head.sha || github.sha) }}
          DIFF_HEAD: ${{ github.event.pull_request.head.sha || github.sha }}
        run: node tools/scripts/check-no-new-any.mjs --base "$DIFF_BASE" --head "$DIFF_HEAD"

      - name: Setup Node
        uses: ./.github/actions/setup-node-backend

      - name: Lint
        run: npm run lint -w @omni-post/shared-cli

      - name: Build Shared Package
        run: npm run build -w @omni-post/shared

      - name: Build
        run: npm run build -w @omni-post/shared-cli

  frontend-ci:
    name: Frontend (Lint, Test & Build)
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.frontend == 'true' || needs.changes.outputs.shared == 'true' || needs.changes.outputs.node_infra == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    timeout-minutes: 20

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Guard No New Any
        env:
          DIFF_BASE: ${{ github.event.before || format('{0}^', github.event.pull_request.head.sha || github.sha) }}
          DIFF_HEAD: ${{ github.event.pull_request.head.sha || github.sha }}
        run: node tools/scripts/check-no-new-any.mjs --base "$DIFF_BASE" --head "$DIFF_HEAD"

      - name: Setup Node
        uses: ./.github/actions/setup-node-frontend

      - name: Build Shared Package
        run: npm run build -w @omni-post/shared

      - name: Security (NPM Audit)
        run: npm audit --audit-level=high --omit=dev

      - name: Lint
        working-directory: apps/frontend
        run: npm run lint

      - name: Run Tests
        # Usage of test:frontend:coverage from root package.json logic or direct
        # package.json in apps/frontend has "test:coverage": "vitest run --coverage"
        working-directory: apps/frontend
        run: npm run test:coverage

      - name: Build
        working-directory: apps/frontend
        run: npm run build

      - name: Upload Coverage
        uses: codecov/codecov-action@v5
        if: always()
        with:
          files: ./apps/frontend/test-results/coverage/coverage-final.json
          flags: frontend
          name: frontend-coverage
          fail_ci_if_error: false

  backend-node-ci:
    name: Backend Node (Lint, Typecheck & Test)
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.backend_node == 'true' || needs.changes.outputs.shared == 'true' || needs.changes.outputs.node_infra == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    timeout-minutes: 20

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Guard No New Any
        env:
          DIFF_BASE: ${{ github.event.before || format('{0}^', github.event.pull_request.head.sha || github.sha) }}
          DIFF_HEAD: ${{ github.event.pull_request.head.sha || github.sha }}
        run: node tools/scripts/check-no-new-any.mjs --base "$DIFF_BASE" --head "$DIFF_HEAD"

      - name: Setup Node Backend
        uses: ./.github/actions/setup-node-backend

      - name: Build Shared Package
        run: npm run build -w @omni-post/shared

      - name: Install Playwright
        working-directory: apps/backend-node
        run: npx playwright install chromium --with-deps

      - name: Security (NPM Audit)
        working-directory: apps/backend-node
        run: npm audit --audit-level=high --omit=dev

      - name: Lint
        working-directory: apps/backend-node
        run: npm run lint

      - name: Typecheck
        working-directory: apps/backend-node
        run: npm run typecheck

      - name: Run Tests
        run: npm test -w apps/backend-node -- --coverage

      - name: Upload Coverage
        uses: codecov/codecov-action@v5
        if: always()
        with:
          files: ./apps/backend-node/coverage/coverage-final.json
          flags: backend-node
          name: backend-node-coverage
          fail_ci_if_error: false

  ci-success:
    name: CI Success
    needs: [changes, backend-ci, shared-ci, cli-ci, frontend-ci, backend-node-ci]
    if: always()
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    timeout-minutes: 5
    steps:
      - name: Verify all jobs passed
        run: |
          results=(
            "${{ needs.changes.result }}"
            "${{ needs.backend-ci.result }}"
            "${{ needs.shared-ci.result }}"
            "${{ needs.cli-ci.result }}"
            "${{ needs.frontend-ci.result }}"
            "${{ needs.backend-node-ci.result }}"
          )
          for r in "${results[@]}"; do
            if [[ "$r" == "failure" || "$r" == "cancelled" ]]; then
              echo "::error::CI job failed or was cancelled ($r)"
              exit 1
            fi
          done
          echo "✅ All CI jobs passed or were skipped"

  release:
    name: Semantic Release
    needs: ci-success
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24.x"

      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm install -g semantic-release@24 @semantic-release/changelog@6.0.3 @semantic-release/git@10.0.1 conventional-changelog-conventionalcommits@8.0.0
          npx semantic-release
